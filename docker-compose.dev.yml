# Development overrides - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Requires .env in project root with Supabase credentials (DATABASE_URL, SUPABASE_*, etc.)

services:
  web:
    build:
      target: deps  # Use deps stage which has node_modules installed
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules  # Named volume to preserve node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: npm run dev

  api:
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/tests:/app/tests
    environment:
      - DEBUG=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  web_node_modules:
