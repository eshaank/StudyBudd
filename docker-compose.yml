# StudyBudd - Docker Compose (Supabase backend, no local DB)
# Production mode - use with: docker compose up
# Dev mode - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG:-false}
    restart: unless-stopped
